# redis.conf — Redis 프로덕션 설정
#
# 적용 방법:
#   redis-server /home/user/smash-renewal/redis.conf
#
# 또는 기존 redis.conf에 아래 설정을 추가/수정:
#   sudo nano /etc/redis/redis.conf

# ── AOF 영속성 (신청 데이터 유실 방지) ───────────────────────────────────────
# appendonly yes: 모든 쓰기 명령을 AOF 파일에 기록한다.
# Redis 재시작 시 AOF를 재생하여 apply_queue의 미처리 신청을 복원한다.
#
# appendfsync everysec: 1초마다 fsync → 최대 1초치 데이터 유실 가능
# (appendfsync always는 매 명령마다 fsync → 성능 저하가 크므로 불필요)
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no

# AOF 파일이 너무 커지면 자동으로 압축 재작성
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ── 바인딩 (로컬 전용) ────────────────────────────────────────────────────────
bind 127.0.0.1
protected-mode yes

# ── 메모리 제한 ───────────────────────────────────────────────────────────────
# t3.small (2 GB RAM) 기준: Redis에 256 MB 할당
# c6i.xlarge (8 GB RAM) 기준: 512 MB 이상으로 조정 가능
maxmemory 256mb
# apply_queue가 가득 차면 오래된 키를 제거하지 않음 (신청 유실 방지)
maxmemory-policy noeviction

# ── 포트 ──────────────────────────────────────────────────────────────────────
port 6379

# ── 로그 ──────────────────────────────────────────────────────────────────────
loglevel notice
